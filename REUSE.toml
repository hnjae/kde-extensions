version = 1
SPDX-PackageName = "kde-plasma-extensions"

[[annotations]]
path = [
  "**/.biome.json",
  "**/.clang-tidy",
  "**/.editorconfig",
  "**/.envrc",
  "**/.gitignore",
  "**/.gitlint",
  "**/.rumdl.toml",
  "**/.taplo.toml",
  "**/.typos.toml",
  "**/.yamlfmt.yaml",
  "**/AGENTS.md",
  "**/CLAUDE.md",
  "**/README.*",
  "**/SPEC.md",
  "**/flake.lock",
  "**/justfile",
  "**/kpackage.json",
  "**/metadata.json",
  "**/package-lock.json",
  "**/package.json",
  "**/statix.toml",
  "**/tsconfig.json",
  "cog.toml",
  "packages/*/src/*.qmltypes",
  "packages/*/src/qmldir",
]
precedence = "closest"
SPDX-FileCopyrightText = "2026 KIM Hyunjae"
SPDX-License-Identifier = "AGPL-3.0-or-later"
